<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="scss/style.css">
</head>
<body>
    <div class="product-card">
        <div class="product-card__image">
            <img src="images/orig.jpg" alt="Смартфон XYZ">
        </div>
        <h3 class="product-card__title">Смартфон XYZ Pro Max</h3>
        <p class="product-card__description">
            Флагманский смартфон с 6.7" OLED-дисплеем, тройной камерой 108 Мп и процессором A16. Поддержка 5G и быстрая зарядка 65W.
        </p>
        <div class="product-card__footer">
            <span class="product-card__price">89 990 ₽</span>
            <button class="product-card__button">В корзину</button>
        </div>
    </div>
</body>
</html>
